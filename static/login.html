<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Finanzas App Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
        }
        .login-card h2 {
            text-align: center;
            margin-bottom: 2rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .error-message {
            color: var(--color-expense);
            background: rgba(248, 113, 113, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
        .login-tabs {
            display: flex;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--glass-border);
        }
        .login-tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.3s;
        }
        .login-tab.active {
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="background-animation"></div>
    
    <div class="container">
        <header>
            <h1>Jetlag Finanzas</h1>
            <p>Control financiero profesional en la nube</p>
        </header>

        <div class="login-wrapper">
            <div class="glass login-card">
                <div class="login-tabs">
                    <div class="login-tab active" id="tab-login">Iniciar Sesión</div>
                    <div class="login-tab" id="tab-register">Registrarse</div>
                </div>

                <!-- Formulario de Login -->
                <form id="login-form">
                    <div class="form-group">
                        <label for="username">Usuario</label>
                        <input type="text" id="username" name="username" required placeholder="Tu nombre de usuario">
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" required placeholder="Tu contraseña">
                    </div>

                    <button type="submit" class="btn-primary" id="login-btn">Entrar</button>
                    <div id="login-error" class="error-message"></div>
                </form>

                <!-- Formulario de Registro (Inicialmente oculto) -->
                <form id="register-form" style="display: none;">
                    <div class="form-group">
                        <label for="reg-username">Nuevo Usuario</label>
                        <input type="text" id="reg-username" name="username" required placeholder="Elige un nombre">
                    </div>
                    
                    <div class="form-group">
                        <label for="reg-password">Nueva Contraseña</label>
                        <input type="password" id="reg-password" name="password" required placeholder="Crea una contraseña">
                    </div>

                    <button type="submit" class="btn-primary" id="register-btn" style="background: linear-gradient(135deg, var(--color-income), #10b981);">Crear Cuenta</button>
                    <div id="register-error" class="error-message"></div>
                    <div id="register-success" class="status-message success" style="margin-top: 10px;"></div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('access_token');
            if (token) {
                window.location.href = '/'; // Ya está logueado
                return;
            }

            const tabLogin = document.getElementById('tab-login');
            const tabRegister = document.getElementById('tab-register');
            const formLogin = document.getElementById('login-form');
            const formRegister = document.getElementById('register-form');

            tabLogin.addEventListener('click', () => {
                tabLogin.classList.add('active');
                tabRegister.classList.remove('active');
                formLogin.style.display = 'block';
                formRegister.style.display = 'none';
            });

            tabRegister.addEventListener('click', () => {
                tabRegister.classList.add('active');
                tabLogin.classList.remove('active');
                formRegister.style.display = 'block';
                formLogin.style.display = 'none';
            });

            // Handle Login
            formLogin.addEventListener('submit', async (e) => {
                e.preventDefault();
                const errDiv = document.getElementById('login-error');
                errDiv.style.display = 'none';
                
                const formData = new URLSearchParams();
                formData.append('username', document.getElementById('username').value);
                formData.append('password', document.getElementById('password').value);

                try {
                    const res = await fetch('/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: formData
                    });

                    const data = await res.json();
                    if (res.ok) {
                        localStorage.setItem('access_token', data.access_token);
                        window.location.href = '/';
                    } else {
                        errDiv.textContent = data.detail || 'Error al iniciar sesión';
                        errDiv.style.display = 'block';
                    }
                } catch (err) {
                    errDiv.textContent = 'Error de conexión';
                    errDiv.style.display = 'block';
                }
            });

            // Handle Register
            formRegister.addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('register-btn');
                const errDiv = document.getElementById('register-error');
                const succDiv = document.getElementById('register-success');
                errDiv.style.display = 'none';
                succDiv.style.opacity = '0';
                
                btn.disabled = true;

                const data = {
                    username: document.getElementById('reg-username').value,
                    password: document.getElementById('reg-password').value
                };

                try {
                    const res = await fetch('/api/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });

                    const resData = await res.json();
                    if (res.ok) {
                        succDiv.textContent = 'Cuenta creada exitosamente. Iniciando sesión...';
                        succDiv.style.display = 'block';
                        succDiv.style.opacity = '1';
                        
                        setTimeout(() => {
                            // Autologin after register
                            document.getElementById('username').value = data.username;
                            document.getElementById('password').value = data.password;
                            tabLogin.click();
                            setTimeout(() => formLogin.dispatchEvent(new Event('submit')), 100);
                        }, 1500);
                    } else {
                        errDiv.textContent = resData.detail || 'Error al crear cuenta';
                        errDiv.style.display = 'block';
                    }
                } catch (err) {
                    errDiv.textContent = 'Error de conexión';
                    errDiv.style.display = 'block';
                } finally {
                    btn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
