<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas Inteligentes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="background-animation"></div>
    
    <div class="container">
        <header style="position: relative;">
            <h1>Finanzas Inteligentes</h1>
            <p>Tu control financiero profesional en la Nube</p>
            <button id="logout-btn" class="btn-primary" style="position: absolute; top: 0; right: 0; width: auto; padding: 0.5rem 1rem; margin-top: 0; font-size: 0.9rem; background: rgba(248, 113, 113, 0.2); border: 1px solid var(--color-expense); color: var(--color-expense);">Cerrar Sesión</button>
        </header>

        <div class="dashboard">
            <div class="summary-cards">
                <div class="card glass">
                    <h3>Ingresos</h3>
                    <p class="amount income" id="total-ingresos">$0.00</p>
                </div>
                <div class="card glass">
                    <h3>Gastos</h3>
                    <p class="amount expense" id="total-gastos">$0.00</p>
                </div>
                <div class="card glass">
                    <h3>Ahorros</h3>
                    <p class="amount savings" id="total-ahorros">$0.00</p>
                </div>
                <div class="card glass main-card">
                    <h3>Balance Disponible</h3>
                    <p class="amount balance" id="total-balance">$0.00</p>
                </div>
            </div>

            <div class="main-content">
                <div class="form-container glass">
                    <h2>Nuevo Registro</h2>
                    <form id="record-form">
                        <div class="form-group">
                            <label for="tipo">Tipo de Movimiento</label>
                            <div class="type-selector">
                                <label><input type="radio" name="tipo" value="Ingreso" checked> <span>Ingreso</span></label>
                                <label><input type="radio" name="tipo" value="Gasto"> <span>Gasto</span></label>
                                <label><input type="radio" name="tipo" value="Ahorro"> <span>Ahorro</span></label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="monto">Monto</label>
                            <input type="number" id="monto" name="monto" step="0.01" min="0" placeholder="0.00" required>
                        </div>

                        <div class="form-group">
                            <label for="categoria">Categoría</label>
                            <select id="categoria" name="categoria" required>
                                <option value="" disabled selected>Selecciona una categoría...</option>
                                <optgroup label="Ingresos" class="opt-ingreso">
                                    <option value="Salario">Salario</option>
                                    <option value="Negocio">Negocio</option>
                                    <option value="Otros Ingresos">Otros Ingresos</option>
                                </optgroup>
                                <optgroup label="Gastos" class="opt-gasto" style="display:none;">
                                    <option value="Alimentación">Alimentación</option>
                                    <option value="Transporte">Transporte</option>
                                    <option value="Vivienda">Vivienda</option>
                                    <option value="Entretenimiento">Entretenimiento</option>
                                    <option value="Salud">Salud</option>
                                    <option value="Otros Gastos">Otros Gastos</option>
                                </optgroup>
                                <optgroup label="Ahorros" class="opt-ahorro" style="display:none;">
                                    <option value="Fondo de Emergencia">Fondo de Emergencia</option>
                                    <option value="Inversiones">Inversiones</option>
                                    <option value="Metas a corto plazo">Metas a corto plazo</option>
                                    <option value="Otros Ahorros">Otros Ahorros</option>
                                </optgroup>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="descripcion">Descripción (Opcional)</label>
                            <input type="text" id="descripcion" name="descripcion" placeholder="Detalles del registro...">
                        </div>

                        <button type="submit" class="btn-primary">Guardar en la Nube</button>
                    </form>
                    <div id="status-message" class="status-message"></div>
                </div>

                <div class="recent-records glass">
                    <h2>Últimos Registros</h2>
                    <div class="records-list" id="records-list">
                        <!-- Javascript generará los registros aquí -->
                        <div class="loading">Cargando registros...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="/static/script.js?v=2"></script>
</body>
</html>
